services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A app.tasks worker --loglevel=info
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

